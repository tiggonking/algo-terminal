format = """

$directory\

${custom.docker}\

$git_branch\
${custom.git_workspace}\
${custom.git_worktree}\
$git_status\

${custom.python_version}\

$conda

[> ](#0000)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

[directory]
style = "bg:#DA627D"
format = "[о‚¶](#DA627D)[рџ“Ѓ $path ]($style)[о‚ґ](#DA627D)[о‚ґ](#1d1d1d)"
truncation_length = 0
truncation_symbol = "вЂ¦/"

[git_branch]
symbol = "рџЊІ"
style = "bg:#FCA17D"
format = '[о‚¶](#FCA17D)[ $symbol $branch ]($style)'

[custom.git_workspace]
style = "bg:#e3d800 fg:#33658A"
format = "[о‚ґ](#FCA17D)[о‚ґ](#1d1d1d)"
when = "git rev-parse --git-dir > /dev/null 2>&1 && ! git status > /dev/null 2>&1"

[custom.git_worktree]
style = "bg:#e3d800 fg:#407a4e"
format = "[о‚ґ](#FCA17D)[о‚ґ](#1d1d1d)"
when = "git rev-parse --is-inside-work-tree 2>&1 | grep -q 'true' && git status | grep -q 'nothing to commit'"

[git_status]
ahead = "[о‚°](fg:#FCA17D bg:#B0E57C)[ в¬†  Ahead ](bg:#B0E57C fg:#1d1d1d)[о‚ґ](#B0E57C)"       # Light Green
behind = "[о‚°](fg:#FCA17D bg:#FF9AA2)[ в¬‡  Behind ](bg:#FF9AA2 fg:#1d1d1d)[о‚ґ](#FF9AA2)"     # Light Coral
diverged = "[о‚°](fg:#FCA17D bg:#FFB7B2)[ в†•  Diverged ](bg:#FFB7B2 fg:#1d1d1d)[о‚ґ](#FFB7B2)"  # Light Pink
untracked = "[о‚°](fg:#FCA17D bg:#FFDAC1)[ рџЄЁ  Unchanged ](bg:#FFDAC1 fg:#1d1d1d)[о‚ґ](#FFDAC1)" # Pastel Orange
modified = "[о‚°](fg:#FCA17D bg:#E2F0CB)[ рџ“’ Modified ](bg:#E2F0CB fg:#1d1d1d)[о‚ґ](#E2F0CB)" # Pale Green
stashed = "[о‚°](fg:#FCA17D bg:#C7CEEA)[ рџ“љ  Stash ](bg:#C7CEEA fg:#1d1d1d)[о‚ґ](#C7CEEA)"     # Periwinkle
renamed = "[о‚°](fg:#FCA17D bg:#FFD3B6)[ рџ“›  Renamed ](bg:#FFD3B6 fg:#1d1d1d)[о‚ґ](#FFD3B6)"   # Light Peach
deleted = "[о‚°](fg:#FCA17D bg:#FFCFD8)[ рџ—‘пёЏ  Deleted ](bg:#FFCFD8 fg:#1d1d1d)[о‚ґ](#FFCFD8)"  # Baby Pink
conflicted = "[о‚°](fg:#FCA17D bg:#FF9CEE)[ вќЊ  Conflicted](bg:#FF9CEE fg:#1d1d1d)[о‚ґ](#FF9CEE)" # Light Magenta

# Default styling for the entire git status; can be overridden by individual status styles.
style = "bg:#e3d800 fg:#33658A"
format = '($all_status[$ahead_behind]($style)[о‚ґ](#1d1d1d))'

[custom.python_version]
command = "python --version 2>&1 | awk '{print $2}'"
symbol = "рџђЌ "
style = "bg:#407a4e"
format = '[о‚¶](#407a4e)[$symbol$output ]($style)[о‚ґ](#407a4e)[о‚ґ](#1d1d1d)'
when = "true"

[custom.docker]
command = "echo $HOSTNAME"
symbol = "рџђі "
style = "bg:#004d80"
format = "[о‚¶](#004d80)[$symbol$output ]($style)[о‚ґ](#004d80)[о‚ґ](#1d1d1d)"
when = 'true'
ignore_timeout = true

